<svg width="1600" height="500" viewBox="0 0 1600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1600" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1A1A"></stop>
      <stop offset="0.35" stop-color="#262626"></stop>
      <stop offset="0.7" stop-color="#6E3B2A"></stop>
      <stop offset="1" stop-color="#8D6A9F"></stop>
    </linearGradient>

    <linearGradient id="soft" x1="200" y1="60" x2="1300" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E7E7E7" stop-opacity="0.10"></stop>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.02"></stop>
    </linearGradient>

    <filter id="blurGlass" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"></feGaussianBlur>
    </filter>

    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"></feTurbulence>
      <feColorMatrix type="saturate" values="0"></feColorMatrix>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"></feFuncA>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="500" fill="#0B0B0B"></rect>
  <rect width="1600" height="500" fill="url(#accent)" opacity="0.14"></rect>

  <rect x="70" y="60" width="1460" height="380" rx="28" fill="#111111" stroke="#2E2E2E"></rect>
  <rect x="70" y="60" width="1460" height="380" rx="28" fill="url(#soft)" filter="url(#blurGlass)"></rect>

  <rect x="110" y="105" width="220" height="10" rx="5" fill="#C86B3C"></rect>
  <rect x="110" y="125" width="120" height="10" rx="5" fill="#8D6A9F"></rect>

  <text x="110" y="220" fill="#F1F1F1" font-size="74" font-family="Arial, Helvetica, sans-serif" font-weight="700">ALBERT</text>
  <text x="110" y="275" fill="#B8B2C8" font-size="28" font-family="Arial, Helvetica, sans-serif" letter-spacing="2">PROMPT ENGINEER • VIBE CODER • PRODUCT ARCHITECT</text>

  <text x="110" y="340" fill="#8E8E8E" font-size="22" font-family="Arial, Helvetica, sans-serif">dark systems / AI-native workflows / brutal interfaces / intentional products</text>

  <rect x="1120" y="105" width="290" height="220" rx="24" fill="#151515" stroke="#313131"></rect>
  <rect x="1150" y="135" width="90" height="90" rx="18" fill="#C86B3C" opacity="0.9"></rect>
  <rect x="1255" y="135" width="125" height="28" rx="14" fill="#2B2B2B"></rect>
  <rect x="1255" y="176" width="95" height="18" rx="9" fill="#8D6A9F" opacity="0.85"></rect>
  <rect x="1150" y="248" width="230" height="20" rx="10" fill="#232323"></rect>
  <rect x="1150" y="282" width="180" height="20" rx="10" fill="#232323"></rect>

  <rect x="1080" y="355" width="330" height="42" rx="21" fill="#131313" stroke="#353535"></rect>
  <text x="1110" y="382" fill="#E5B07A" font-size="20" font-family="Arial, Helvetica, sans-serif">build what should exist</text>

  <rect width="1600" height="500" filter="url(#grain)" opacity="0.35"></rect>
</svg>